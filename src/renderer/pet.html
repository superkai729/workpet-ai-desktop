<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&#26700;&#23456;</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="pet-body" data-pet-theme="orange">
    <div class="pet-stage" id="petStage">
      <div class="speech" id="speech">&#20241;&#24687;&#19968;&#19979;&#65311;</div>
      <div class="pet-menu hidden" id="petMenu">
        <button data-action="happy">♡ &#25720;&#25720;</button>
        <button data-action="eat">◒ &#21890;&#39135;</button>
        <button data-action="sleep">☾ &#30561;&#35273;</button>
        <hr />
        <button data-tool="screenshot">▣ &#25130;&#22270;</button>
        <button data-tool="translate">&#25991; &#32763;&#35793;</button>
        <button data-tool="chat">? &#38382;&#38382;&#23427;</button>
        <hr />
        <button data-action="idle">⚙ &#35774;&#32622;</button>
        <button data-action="hide">× &#38544;&#34255;&#23456;&#29289;</button>
      </div>
      <button class="pet-button" id="petButton" aria-label="工位小宠">
        <span class="pixel-pet idle" id="pet">
          <span class="ear left"></span>
          <span class="ear right"></span>
          <span class="face"></span>
          <span class="body"></span>
          <span class="tail"></span>
        </span>
      </button>
    </div>
    <script src="./pet.js"></script>
  </body>
</html>
