    <main class="tool-shell">
      <div class="brand-row compact">
        <div class="logo-mark">P</div>
        <span id="toolTitle">&#38382;&#38382;&#24180;&#31957;</span>

        <textarea id="chatInput" placeholder="输入问题，例如：帮我总结这段文字"></textarea>

          <button class="secondary" id="translateShot" disabled>&#32763;&#35793;&#25130;&#22270;</button>
          <button class="secondary" id="copyOcr" disabled>&#22797;&#21046;&#35782;&#21035;&#25991;&#23383;</button>
          <button class="secondary" id="copyTranslation" disabled>&#22797;&#21046;&#32763;&#35793;&#32467;&#26524;</button>
        </div>

            <h3>OCR</h3>

          </div>
          <div class="result-block">
